# AI Notes — self-hosted stack.
#
# Two services: the FastAPI app and Ollama with models baked in. The app talks
# to Ollama over the internal Docker network; neither needs to be published
# beyond localhost.
#
# First-run:
#   docker compose build          # ~3 GB image build, pulls qwen3:4b + gemma3:270m
#   docker compose up -d
# Open http://127.0.0.1:8765
#
# To change which models are baked in, edit the OLLAMA_MODELS build arg below.

services:
  app:
    build: .
    image: ai-notes:latest
    container_name: ai-notes-app
    depends_on:
      - ollama
    environment:
      AI_NOTES_HOST: 0.0.0.0
      AI_NOTES_PORT: 8765
      AI_NOTES_DB: /data/notes.db
      AI_NOTES_UPLOADS: /data/uploads
      AI_NOTES_OLLAMA_MANAGED: "0"
      AI_NOTES_OLLAMA_HOST: http://ollama:11434
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ai-notes-data:/data
    restart: unless-stopped

  ollama:
    build:
      context: ./docker/ollama
      args:
        # Space-separated list of Ollama model tags to bake into the image.
        # Add or remove models here, then `docker compose build ollama`.
        OLLAMA_MODELS: "qwen3:4b gemma3:270m"
    image: ai-notes-ollama:latest
    container_name: ai-notes-ollama
    # Not published to the host — reachable only from the app container.
    expose:
      - "11434"
    restart: unless-stopped
    # Uncomment for NVIDIA GPU passthrough (Linux + NVIDIA Container Toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ai-notes-data:
